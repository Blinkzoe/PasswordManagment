<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PassM Login</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>


<div class="login-container">


    <div class="logo">
        🔐
    </div>


    <h1>
        PassM
    </h1>


    <p class="subtitle">
        Secure Account Manager
    </p>



    <div class="form">


        <input
            id="username"
            type="text"
            placeholder="Username"
        >



        <input
            id="password"
            type="password"
            placeholder="Password"
        >



        <button onclick="login()">
            Sign In
        </button>


        <p id="message"></p>


    </div>


</div>



<script src="app.js"></script>


</body>

</html>
